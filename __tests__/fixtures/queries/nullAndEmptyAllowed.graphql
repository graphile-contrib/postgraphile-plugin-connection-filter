# All queries in this file should result in no filter being applied, thus returning all rows
# (queries are an exact copy of nullAndEmptyForbidden.graphql)
query ($undefined: String, $null: String = null) {
  a: allFilterables(filter: null) {
    totalCount
  }
  b: allFilterables(filter: {}) {
    totalCount
  }
  c: allFilterables(filter: { text: null }) {
    totalCount
  }
  d: allFilterables(filter: { text: {} }) {
    totalCount
  }
  e: allFilterables(filter: { text: null, int4: null }) {
    totalCount
  }
  f: allFilterables(filter: { text: {}, int4: {} }) {
    totalCount
  }
  g: allFilterables(filter: { text: null, int4: {} }) {
    totalCount
  }
  h: allFilterables(filter: { text: { equalTo: null } }) {
    totalCount
  }
  i: allFilterables(filter: { text: { equalTo: null, notEqualTo: null } }) {
    totalCount
  }
  j: allFilterables(
    filter: {
      text: { equalTo: null, notEqualTo: null }
      int4: { equalTo: null }
      numeric: {}
      bool: null
    }
  ) {
    totalCount
  }
  k: allFilterables(filter: { and: null }) {
    totalCount
  }
  l: allFilterables(filter: { and: [{}] }) {
    totalCount
  }
  m: allFilterables(filter: { and: [{}, {}] }) {
    totalCount
  }
  n: allFilterables(filter: { or: null }) {
    totalCount
  }
  o: allFilterables(filter: { or: [{}] }) {
    totalCount
  }
  p: allFilterables(filter: { or: [{}, {}] }) {
    totalCount
  }
  q: allFilterables(filter: { not: null }) {
    totalCount
  }
  r: allFilterables(filter: { not: {} }) {
    totalCount
  }
  s: allFilterables(filter: { not: { text: null } }) {
    totalCount
  }
  t: allFilterables(filter: { not: { text: {} } }) {
    totalCount
  }
  forward_name_unfiltered: allFilterables {
    ...textConnection
  }
  forward_name_equalTo_forward2: allFilterables(
    filter: { forwardByForwardId: { name: { equalTo: "forward2" } } }
  ) {
    ...textConnection
  }
  forward_name_equalTo_null: allFilterables(
    filter: { forwardByForwardId: { name: { equalTo: null } } }
  ) {
    ...textConnection
  }
  forward_name_equalTo_undefined: allFilterables(
    filter: { forwardByForwardId: { name: { equalTo: $undefined } } }
  ) {
    ...textConnection
  }
  children_unfiltered: allFilterables {
    ...childrenConnection
  }
  children_some_name_equalTo_child2: allFilterables(
    filter: {
      childrenByFilterableId: { some: { name: { equalTo: "child2" } } }
    }
  ) {
    ...childrenConnection
  }
  children_some_name_equalTo_null: allFilterables(
    filter: { childrenByFilterableId: { some: { name: { equalTo: $null } } } }
  ) {
    ...childrenConnection
  }
  children_some_name_equalTo_undefined: allFilterables(
    filter: {
      childrenByFilterableId: { some: { name: { equalTo: $undefined } } }
    }
  ) {
    ...childrenConnection
  }
  children_none_name_equalTo_child2: allFilterables(
    filter: {
      childrenByFilterableId: { none: { name: { equalTo: "child2" } } }
    }
  ) {
    ...childrenConnection
  }
  children_none_name_equalTo_null: allFilterables(
    filter: { childrenByFilterableId: { none: { name: { equalTo: $null } } } }
  ) {
    ...childrenConnection
  }
  children_none_name_equalTo_undefined: allFilterables(
    filter: {
      childrenByFilterableId: { none: { name: { equalTo: $undefined } } }
    }
  ) {
    ...childrenConnection
  }
}

fragment textConnection on FilterablesConnection {
  nodes {
    id
    text
  }
}

fragment childrenConnection on FilterablesConnection {
  nodes {
    id
    childrenByFilterableId {
      nodes {
        id
        name
      }
    }
  }
}
